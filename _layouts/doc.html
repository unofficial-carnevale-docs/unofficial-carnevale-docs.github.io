---
layout: default
---
{% assign sec_data = site.data.sections[page.section] %}
<div class="doc-layout">
  <aside class="sidebar">
    {% include sidebar.html %}
  </aside>
  <main class="doc-content section-{{ page.section }}">

    <h1>{{ page.title }}</h1>
    {% if page.description %}<p class="doc-lead">{{ page.description }}</p>{% endif %}

    <hr>

    {{ content }}


  </main>
</div>
