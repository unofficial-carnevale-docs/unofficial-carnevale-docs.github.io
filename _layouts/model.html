---
layout: default
---
<div class="doc-layout doc-layout--solo">
  <main class="doc-content">

    <nav class="breadcrumbs" aria-label="Breadcrumb">
      <a href="{{ '/' | relative_url }}">Home</a>
      <span aria-hidden="true">›</span>
      <a href="{{ '/factions/' | relative_url }}">Factions</a>
      <span aria-hidden="true">›</span>
      {% if page.faction %}
        <a href="{{ '/factions/' | append: page.faction | append: '/' | relative_url }}">
          {{ page.faction_title | default: page.faction }}
        </a>
        <span aria-hidden="true">›</span>
      {% endif %}
      <span class="current">{{ page.title }}</span>
    </nav>

    <h1>{{ page.title }}</h1>
    {% if page.description %}<p class="doc-lead">{{ page.description }}</p>{% endif %}

    <hr>

    {{ content }}

  </main>
</div>
