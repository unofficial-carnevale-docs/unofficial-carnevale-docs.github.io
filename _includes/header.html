<header class="site-header">
  <div class="header-inner">

    <a href="{{ '/' | relative_url }}" class="site-logo" aria-label="{{ site.title }} home">
      <svg width="11" height="11" viewBox="0 0 11 11" aria-hidden="true">
        <path d="M5.5 0L11 5.5L5.5 11L0 5.5Z" fill="currentColor"/>
      </svg>
      <span class="logo-title">CARNEVALE</span>
    </a>

    <nav class="main-nav" id="main-nav" aria-label="Main navigation">
      <a href="{{ '/rules/' | relative_url }}"{% if page.section == 'rules_reference' %} class="active" aria-current="page"{% endif %}>Rules Reference</a>
      <a href="{{ '/compendium/quick-reference/' | relative_url }}"{% if page.section == 'compendium' %} class="active" aria-current="page"{% endif %}>Compendium</a>
      <a href="{{ '/factions/' | relative_url }}"{% if page.section == 'factions' %} class="active" aria-current="page"{% endif %}>Factions</a>
      <a href="{{ '/magic/' | relative_url }}"{% if page.section == 'magic' %} class="active" aria-current="page"{% endif %}>Magic</a>
      <a href="{{ '/mechanics/' | relative_url }}"{% if page.section == 'mechanics' %} class="active" aria-current="page"{% endif %}>Game Mechanics</a>
      <a href="{{ '/about/' | relative_url }}"{% if page.url == '/about/' %} class="active nav-secondary" aria-current="page"{% else %} class="nav-secondary"{% endif %}>About</a>
    </nav>

    <button class="mobile-menu-toggle" id="mobile-menu-toggle"
            aria-expanded="false" aria-controls="main-nav"
            aria-label="Toggle navigation menu">
      <span></span>
      <span></span>
      <span></span>
    </button>

  </div>
</header>
