<div class="calc" markdown="0">
  <p class="calc-header">Jump Calculator</p>
  <div class="calc-body">
    <div class="calc-controls">
      <div class="calc-fields">
        <div class="calc-row">
          <label for="jmp-dex">Dexterity (DEX)</label>
          <div class="calc-input">
            <input id="jmp-dex" type="number" min="1" max="8" step="1" value="4">
          </div>
        </div>
        <div class="calc-row">
          <label for="jmp-acro">Acrobatic (X)</label>
          <div class="calc-input">
            <input id="jmp-acro" type="number" min="0" max="3" step="1" value="0">
          </div>
        </div>
        <div class="calc-row">
          <label for="jmp-base">Base size</label>
          <div class="calc-input">
            <select id="jmp-base">
              <option value="30">30mm</option>
              <option value="40">40mm</option>
              <option value="50">50mm</option>
              <option value="60">60mm</option>
              <option value="75">75mm</option>
            </select>
          </div>
        </div>
        <div class="calc-row">
          <label for="jmp-gap">Horizontal gap</label>
          <div class="calc-input">
            <input id="jmp-gap" type="number" min="0" step="0.5" value="3">
            <span class="calc-unit">"</span>
          </div>
        </div>
        <div class="calc-row">
          <label for="jmp-height">Target height</label>
          <div class="calc-input">
            <input id="jmp-height" type="number" min="0" max="3" step="0.5" value="0">
            <span class="calc-unit">"</span>
          </div>
        </div>
      </div>
      <div class="jump-result" id="jump-result">
        <div class="jump-verdict">
          <span class="jump-verdict-icon" id="jmp-icon"></span>
          <span class="jump-verdict-text" id="jmp-verdict">—</span>
        </div>
        <dl class="jump-readout">
          <div><dt>Straight-line to edge</dt><dd id="jmp-R">—</dd></div>
          <div><dt id="jmp-M-label">+ base to land fully</dt><dd id="jmp-M">—</dd></div>
          <div><dt id="jmp-E-label">Expected jump</dt><dd id="jmp-E">—</dd></div>
          <div class="chance"><dt>Chance to land fully</dt><dd id="jmp-P">—</dd></div>
        </dl>
      </div>
    </div>
    <figure class="calc-figure">
      <svg id="jump-diagram" viewBox="0 0 480 320" preserveAspectRatio="xMidYMid meet"
           role="img" aria-label="Side-view of the jump showing the required distance and the expected reach"></svg>
      <figcaption>Side-view cross-section. The coloured path is the average reach; the ghost model marks where the base must land.</figcaption>
    </figure>
  </div>
</div>
